name: Android CI

on:
  pull_request:
  push:
    branches: [main]
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required Android SDK
        run: sdkmanager "platforms;android-36.1" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode Keystore
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        if: ${{ env.SIGNING_KEY != '' }}
        run: echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > ${{ github.workspace }}/release.keystore

      - name: Verify build, tests, and lint
        run: >-
          ./gradlew
          :core:protocol:test
          :core:local:testDebugUnitTest
          :core:sync:testDebugUnitTest
          :core:protocol:lintDebug
          :core:local:lintDebug
          :core:sync:lintDebug
          :app:lintDebug
          :app:assembleDebug
          :app:assembleRelease
          --configuration-cache
        env:
          ANDROID_SIGNING_KEY_FILE: ${{ github.workspace }}/release.keystore
          ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Prepare Release APKs
        run: |
          mkdir -p release-apks
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk release-apks/ClipSync.apk
          else
            cp app/build/outputs/apk/release/app-release-unsigned.apk release-apks/ClipSync.apk
          fi
          cp app/build/outputs/apk/debug/app-debug.apk release-apks/ClipSync-debug.apk

      - name: Create GitHub Release and Upload Artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release-apks/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
