name: Android CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required Android SDK
        run: sdkmanager "platforms;android-36.1" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify build, tests, lint, and minified release
        run: >-
          ./gradlew
          :core:protocol:test
          :app:testDebugUnitTest
          lintDebug
          :app:assembleDebug
          :app:assembleRelease
          --configuration-cache
